[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --tb=short
    --no-header
    -q

markers =
    unit: Fast, isolated unit tests (no I/O, no network)
    integration: Tests that touch real subsystems (DB, filesystem)
    slow: Tests that take > 1 second
    voice: Tests requiring audio hardware
    desktop: Tests requiring display
    ci: Tests safe to run in CI without extra deps
