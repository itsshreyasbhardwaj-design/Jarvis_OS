name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: "check src/ tests/"
      - uses: astral-sh/ruff-action@v1
        with:
          args: "format --check src/ tests/"
